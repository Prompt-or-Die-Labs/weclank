name: Release

on:
  push:
    tags:
      - "v*"
  # Manual / chained-from-auto-tag fallback. GITHUB_TOKEN-pushed tags
  # don't trigger workflows by default, so auto-release-tag.yml dispatches
  # this workflow after the tag push to keep the pipeline automated.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.7.0). Default = the ref this workflow was dispatched against."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Resolves to the dispatched tag input when run manually (e.g. backfill),
  # otherwise falls back to the ref of the triggering tag push.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify (check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Same as ci.yml: real-ffmpeg smoke + RTMP-loopback + encoder
      # probe tests skip silently without ffmpeg. We want them to run.
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Check
        run: bun run check

  build:
    name: Build (${{ matrix.asset }})
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            asset: macos-arm64
          - runs-on: ubuntu-22.04
            asset: linux-x64
          - runs-on: windows-latest
            asset: windows-x64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install Linux build dependencies
        if: matrix.asset == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync version from tag
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          export VERSION="${VERSION#v}"
          bun scripts/sync-release-version.ts

      - name: Clean build directory
        shell: bash
        run: rm -rf build

      - name: Production build
        run: bun run build:canary

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT=$(bun scripts/package-build-artifact.ts "${{ env.RELEASE_TAG }}" "${{ matrix.asset }}")
          echo "ARCHIVE=$OUT" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: weclank-${{ matrix.asset }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: weclank-*
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -print

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*.tar.gz
          # Prepended before the auto-generated "What's Changed" block.
          # Saves every downloader from rediscovering the Gatekeeper
          # workaround.
          body: |
            ## First-run on macOS

            Release builds are ad-hoc signed, not notarized (the Apple Developer Program is $99/yr we haven't spent). macOS Gatekeeper marks any unsigned app downloaded from the internet as "damaged" on first launch. Clear the quarantine bit once and the app runs normally:

            ```sh
            xattr -dr com.apple.quarantine /path/to/weclank-canary.app
            ```

            On older macOS versions, right-click → **Open** also works (the prompt offers an "Open Anyway" button that a normal double-click doesn't). Same flow as any open-source Mac app distributed outside the App Store.

            ## First-run on Linux

            ```sh
            tar -xzf weclank-${{ env.RELEASE_TAG }}-linux-x64.tar.gz
            cd canary-linux-x64/weclank-canary
            ./launcher
            ```

            `ffmpeg` must be on `$PATH` for RTMP egress.

            ## First-run on Windows

            SmartScreen will warn about an "unrecognized app" — click **More info** → **Run anyway**. Same un-notarized reason as macOS.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
