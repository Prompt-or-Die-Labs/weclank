name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

  build:
    name: Build (${{ matrix.asset }})
    needs: verify
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            asset: macos-arm64
          - runs-on: ubuntu-22.04
            asset: linux-x64
          - runs-on: windows-latest
            asset: windows-x64

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install Linux build dependencies
        if: matrix.asset == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync version from tag
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${VERSION#v}"
          bun scripts/sync-release-version.ts

      - name: Clean build directory
        shell: bash
        run: rm -rf build

      - name: Production build
        run: bun run build:canary

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT=$(bun scripts/package-build-artifact.ts "${{ github.ref_name }}" "${{ matrix.asset }}")
          echo "ARCHIVE=$OUT" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: weclank-${{ matrix.asset }}
          path: ${{ env.ARCHIVE }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: weclank-*
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f -print

      - uses: softprops/action-gh-release@v3
        with:
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
